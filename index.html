<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>QR</title>
<style>
body{
  background:#0a0f1d;
  color:#fff;
  text-align:center;
}
#box{
  max-width:400px;
  margin:0 auto;
  background:#111;
  padding:10px;
}
.btn{
  width:90%;
  padding:15px;
  margin:5px;
  background:#06f;
  color:#fff;
  font-weight:bold;
}
.row{
  display:flex;
  justify-content:
    space-between;
}
</style>
</head>
<body>

<h1 id="logo"
  style="color:#0df;">
  Quizroot
</h1>

<div id="box">
  <div id="tabs">
    <button onclick="v(1)">
      ロビー
    </button>
    <button onclick="v(3)">
      作製
    </button>
  </div>

  <!-- 1.ロビー -->
  <div id="d1">
    PIN:<span id="spin"></span>
    <br>
    コード入力:
    <input id="inp"
      onkeydown="cc(event)">
    <br>
    <div id="pd"
      style="color:#0df;
      font-size:24px;"></div>
    <button onclick="k('1')">1</button>
    <button onclick="k('2')">2</button>
    <button onclick="k('3')">3</button><br>
    <button onclick="k('4')">4</button>
    <button onclick="k('5')">5</button>
    <button onclick="k('6')">6</button><br>
    <button onclick="k('7')">7</button>
    <button onclick="k('8')">8</button>
    <button onclick="k('9')">9</button><br>
    <button onclick="k('C')"
      style="background:red;">
      C
    </button>
    <button onclick="k('0')">0</button>
    <button onclick="k('E')"
      style="background:green;">
      ▶
    </button>
  </div>

  <!-- 2.ゲーム -->
  <div id="d2"
    style="display:none;">
    <div id="notif"
      style="color:#0ff;
      background:#222;
      text-align:left;">
    </div>
    <h3 id="qt"></h3>
    <button id="b0" class="btn"
      onclick="s(0)"></button>
    <button id="b1" class="btn"
      onclick="s(1)"></button>
    <button id="b2" class="btn"
      onclick="s(2)"></button>
    <button id="b3" class="btn"
      onclick="s(3)"></button>
    <div id="list"
      style="text-align:left;">
    </div>
  </div>

  <!-- 3.クリエイト -->
  <div id="d3"
    style="display:none;">
    <input id="cq" value="名前は?"><br>
    <input id="c0" value="A">
    <input id="c1" value="B"><br>
    <input id="c2" value="C">
    <input id="c3" value="D"><br>
    正解(0-3):
    <input id="ca" value="0">
    <button onclick="add()">
      ➕ 追加
    </button>
    <button onclick="startC()"
      style="background:#06f;">
      🚀 スタート
    </button>
  </div>
</div>

<script>
const bgm = new Audio('kahoot.wav');
bgm.loop = true;

const pin = String(
  ((new Date().getFullYear() +
    new Date().getMonth() +
    new Date().getDate()) * 7)
    % 9000 + 1000
);
spin.innerText = pin;

let defaultQ = [
  {q:"カラーは?",c:["緑","青","赤","黄"],a:1},
  {q:"スタイル?",c:["1人","100人","2人","協力"],a:0},
  {q:"スキン名は?",c:["赤","影","氷","紫"],a:2}
];
let qList = [];
let cList = [];
let cur = 0;
let time = 0;
let inputPin = "";
let scores = [
  {n:"あなた",s:0,b:false,st:0},
  {n:"AI1🤖",s:0,b:true,ac:0.8,st:0},
  {n:"AI2⚡",s:0,b:true,ac:0.6,st:0}
];

function cc(e) {
  if (e.key === 'Enter') {
    if (inp.value === 'ICE-BLUE-2026') {
      logo.style.color = '#0ff';
      logo.innerText = "QR [ICE]";
      alert("スキン適用！💎");
    }
  }
}

function v(num) {
  d1.style.display =
    num === 1 ? 'block' : 'none';
  d2.style.display =
    num === 2 ? 'block' : 'none';
  d3.style.display =
    num === 3 ? 'block' : 'none';
}

function k(val) {
  if (bgm.paused) bgm.play().catch(()=>{});
  if (val === 'C') inputPin = "";
  else if (val === 'E') {
    if (inputPin === pin) start(defaultQ);
    else inputPin = "";
  } else if (inputPin.length < 4) {
    inputPin += val;
  }
  pd.innerText = inputPin;
}

function add() {
  if(!cq.value) return;
  cList.push({
    q: cq.value,
    c: [c0.value, c1.value,
        c2.value, c3.value],
    a: parseInt(ca.value)
  });
  cq.value = "";
  alert("追加完了");
}

function startC() {
  if(cList.length === 0) add();
  start(cList);
}

function start(set) {
  qList = set;
  cur = 0;
  scores.forEach(p => {
    p.s = 0; p.st = 0;
  });
  v(2);
  tabs.style.display = 'none';
  showQ();
}

function showQ() {
  if (cur >= qList.length) {
    let pts = scores.find(p => !p.b).s;
    let win = pts >= (qList.length * 500);
    d2.innerHTML = `
      <h2>スコア: ${pts}</h2>
      ${win ? '<h3>【ICE-BLUE-2026】</h3>':'<h3>失敗</h3>'}
      <button onclick="location.reload()">戻る</button>`;
    return;
  }
  qt.innerText = `Q${cur+1}: ${qList[cur].q}`;
  for (let i=0; i<4; i++) {
    window['b'+i].innerText = qList[cur].c[i];
  }
  time = Date.now();
  ref();
}

function s(choice) {
  notif.innerHTML = "";
  if (choice === qList[cur].a) {
    let pts = Math.max(500,
      Math.round(1000 - (
      (Date.now() - time) /
      1000 * 150)));
    scores.find(p => !p.b).s += pts;
    notif.innerHTML += `<div>🔵あなた正解(+${pts})</div>`;
  } else {
    notif.innerHTML += `<div>💥あなた不正解</div>`;
  }
  
  scores.forEach((p, idx) => {
    if (p.b) {
      if (Math.random() < p.ac) {
        p.s += Math.max(500,
          Math.round(1000 - (
          Math.random() * 2 * 150)));
        p.st++;
        if (p.st === (cur + 1)) {
          notif.innerHTML += `<div>🔥連勝!${p.n}</div>`;
        } else {
          notif.innerHTML += `<div>✅${p.n}正解</div>`;
        }
      } else {
        p.st = 0;
        notifBox = `<div>❌${p.n}不解</div>`;
      }
    }
  });
  cur++;
  showQ();
}

function ref() {
  scores.sort((a, b) => b.s - a.s);
  list.innerHTML = "";
  scores.forEach((p, i) => {
    list.innerHTML += `
      <div class="row">
        <span>${i+1}位:${p.n}</span>
        <span>${p.s}pt</span>
      </div>`;
  });
}
</script>
</body>
</html>
